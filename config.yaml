camera:
  width: 1280
  height: 720
  fps: 15
  pixel_format: RGB888
  dtype: uint8
  log_every_n_seconds: 3600

shared_memory:
  name: frame_buffer
  buffer_size: 32

detection:
  enabled: true
  detect_every_n_frames: 30
  model_path: models/yolo26n_ncnn_model_640
  image_size: 640
  confidence: 0.35

  cpu_affinity: [2, 3]
  torch_num_threads: 2
  torch_num_interop_threads: 1
  process_nice: 5
  log_every_n_seconds: 3600

video:
  buffer_size: 30
  startup_delay_ms: 1200
  log_every_n_seconds: 60

stream:
  enabled: true
  rtsp_url: rtsp://127.0.0.1:8554/live
  # codec: h264_v4l2m2m
  # bitrate: 1200k
  gop_seconds: 1
  codec: h264_v4l2m2m
  bitrate: 800k


ipc:
  video_frame_meta_socket: /tmp/animal_video_frame_meta.sock
  detection_frame_meta_socket: /tmp/animal_detection_frame_meta.sock
  detection_result_socket: /tmp/animal_detection_result.sock

runtime:
  log_every_n_frames: 30